<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Scraper Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 50px 0; }
        .container-main { max-width: 800px; margin: 0 auto; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
        .btn-scrape { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; }
    </style>
</head>
<body>
    <div class="container-main">
        <div class="card">
            <div class="card-header">
                <h1>🕷️ Web Scraper Tool</h1>
                <p>Extract data instantly</p>
            </div>
            <div class="card-body" style="padding: 40px;">
                <form id="form">
                    <div class="mb-3">
                        <label class="form-label">URL</label>
                        <input type="text" class="form-control" id="url" placeholder="https://example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Type</label>
                        <select class="form-select" id="type" required>
                            <option value="ecommerce">E-commerce</option>
                            <option value="realestate">Real Estate</option>
                            <option value="job">Jobs</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-scrape w-100">Start Scraping</button>
                </form>
                <div id="results" style="display:none; margin-top: 20px;">
                    <h5>Results</h5>
                    <table class="table" id="table"><tbody id="body"></tbody></table>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const response = await fetch('/api/scrape', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url: document.getElementById('url').value, type: document.getElementById('type').value, format: 'csv'})
            });
            const data = await response.json();
            if (data.success) {
                document.getElementById('body').innerHTML = data.data.map(d => '<tr><td>' + JSON.stringify(d) + '</td></tr>').join('');
                document.getElementById('results').style.display = 'block';
            }
        });
    </script>
</body>
</html>
